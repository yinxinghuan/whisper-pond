<!doctype html>
<html lang="en">
  <head>
    <meta name="game-uuid" content="97d2e964-61e8-41f9-9fe2-bc0ab7b76b14" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/gif" href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" />
    <title>Physics Pond</title>
    <script src="./aigram-bridge.js"></script>
  </head>
  <body>
    <div id="app" class="wp-shell">
      <div id="stage" class="wp-stage" aria-hidden="true"></div>
      <div class="wp-glass" aria-hidden="true"></div>

      <header class="wp-hud" data-screen="play">
        <div class="wp-hud__time">
          <span data-i18n="time">Bodies</span>
          <strong id="timeLeft">500</strong>
        </div>
        <div class="wp-hud__score">
          <span data-i18n="score">Goal</span>
          <strong id="scoreValue">0</strong>
        </div>
      </header>

      <main id="startScreen" class="wp-screen wp-screen--start">
        <section class="wp-start-card">
          <div class="wp-kicker" data-i18n="kicker">Bright cannon study</div>
          <h1 data-i18n="title">Physics Pond</h1>
          <p class="wp-copy" data-i18n="startCopy">Drag the planks to steer falling spheres into the glowing target slot.</p>
          <button id="startButton" class="wp-button wp-button--primary" type="button" data-i18n="start">Begin</button>
        </section>
      </main>

      <main id="gameScreen" class="wp-screen wp-screen--game" aria-live="polite">
        <div id="levelBadge" class="wp-level-badge">LEVEL 1/5</div>
        <div id="objectivePanel" class="wp-objective">
          <strong id="objectiveTitle">CENTER SLOT</strong>
          <span id="objectiveDetail">Need 12 · 3 planks move</span>
        </div>
        <div id="comboBadge" class="wp-combo" aria-hidden="true"></div>
        <div id="slotHud" class="wp-slots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div id="slotLabels" class="wp-slot-labels" aria-hidden="true">
          <span>LEFT</span>
          <span>CENTER</span>
          <span>RIGHT</span>
        </div>
        <div id="hint" class="wp-hint" data-i18n="hint">Drag planks · Feed the glowing slot</div>
      </main>

      <main id="endScreen" class="wp-screen wp-screen--end">
        <section class="wp-end-card">
          <div id="resultLabel" class="wp-kicker" data-i18n="complete">Pond settled</div>
          <h2 id="finalScore">0</h2>
          <div class="wp-stats">
            <div><span data-i18n="best">Best</span><strong id="bestScore">0</strong></div>
            <div><span data-i18n="stones">Bodies</span><strong id="stoneCount">0</strong></div>
            <div><span data-i18n="combo">Streak</span><strong id="bestCombo">1</strong></div>
          </div>
          <p id="finalThought" class="wp-final-thought"></p>
          <div class="wp-actions">
            <button id="againButton" class="wp-button wp-button--primary" type="button" data-i18n="again">Again</button>
            <button id="changeButton" class="wp-button" type="button" data-i18n="change">Retry</button>
            <button id="homeButton" class="wp-button" type="button" data-i18n="home">Home</button>
          </div>
        </section>
      </main>

      <button id="leaderboardButton" class="wp-rank-button" type="button" aria-label="Leaderboard" hidden>🏆</button>

      <div id="leaderboardModal" class="wp-leaderboard" hidden>
        <div class="wp-leaderboard__panel" role="dialog" aria-modal="true" aria-labelledby="leaderboardTitle">
          <header class="wp-leaderboard__head">
            <div>
              <div id="leaderboardTitle" class="wp-leaderboard__title" data-i18n="leaderboardTitle">Leaderboard</div>
              <div class="wp-leaderboard__game">Physics Pond</div>
            </div>
            <button id="leaderboardClose" class="wp-leaderboard__close" type="button" aria-label="Close">×</button>
          </header>
          <div id="leaderboardBody" class="wp-leaderboard__body">
            <div class="wp-leaderboard__state" data-i18n="leaderboardLoading">Loading…</div>
          </div>
        </div>
      </div>

      <img class="wp-watermark" src="./img/aigram.svg" alt="" draggable="false" />
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
